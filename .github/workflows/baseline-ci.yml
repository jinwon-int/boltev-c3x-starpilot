name: Baseline CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  baseline:
    name: Docs and snapshot validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: jinwon-int/github-workflows/actions/checkout@3b20bdaac0a4ba33dbeaa1dd105f1a05d381d636 # central Node24

      - name: Set up Python
        uses: jinwon-int/github-workflows/actions/setup-python@3b20bdaac0a4ba33dbeaa1dd105f1a05d381d636 # central Node24
        with:
          python-version: '3.11'

      - name: Install validation tools
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Structured snapshot syntax check
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys
          import tomllib
          import yaml

          failures = []
          for path in sorted(pathlib.Path('.').rglob('*')):
              if '.git' in path.parts or not path.is_file():
                  continue
              try:
                  if path.suffix == '.json':
                      json.loads(path.read_text(encoding='utf-8'))
                  elif path.suffix == '.toml':
                      tomllib.loads(path.read_text(encoding='utf-8'))
                  elif path.suffix in {'.yml', '.yaml'}:
                      yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failures.append(f'{path}: {exc}')
          if failures:
              print('\n'.join(failures), file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Markdown and relative-link smoke check
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys
          failures = []
          link_re = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          for path in sorted(pathlib.Path('.').rglob('*.md')):
              if '.git' in path.parts:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError as exc:
                  failures.append(f'{path}: not UTF-8 ({exc})')
                  continue
              for target in link_re.findall(text):
                  target = target.strip().split()[0]
                  if not target or target.startswith(('#', 'http://', 'https://', 'mailto:')):
                      continue
                  target = target.split('#', 1)[0]
                  if target and not (path.parent / target).exists():
                      failures.append(f'{path}: missing relative link target {target}')
          if failures:
              print('\n'.join(failures), file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Conservative secret-pattern scan
        run: |
          if grep -RInE --exclude-dir=.git -e '-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|AKIA[0-9A-Z]{16}' -- .; then
            echo 'Potential secret material found.' >&2
            exit 1
          fi
